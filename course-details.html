<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Details — Skill Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
:root {
    --ink: #0d0d0f; --paper: #f5f3ee; --accent: #ff4d2e; --accent2: #ffb800;
    --muted: #8a8680; --card: #fff; --border: #e2dfd8; --green: #22c55e;
}
body { font-family:'DM Sans',sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; }

/* HEADER */
header { display:flex; justify-content:space-between; align-items:center; padding:0 48px; height:64px; background:rgba(245,243,238,0.88); backdrop-filter:blur(14px); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.15rem; display:flex; align-items:center; gap:8px; color:var(--ink); text-decoration:none; }
.logo-dot { width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite; }
@keyframes pulse {0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.4);opacity:.7;}}
nav a { margin-left:10px; padding:6px 12px; text-decoration:none; color:var(--muted); border-radius:100px; transition:0.2s; font-size:.85rem; font-weight:500; }
nav a:hover { background:rgba(13,13,15,.06); color:var(--ink); }
.nav-back { border:1.5px solid var(--border); color:var(--ink) !important; }
.nav-logout { background:var(--ink); color:#fff !important; border-radius:12px; font-family:'Syne',sans-serif; font-weight:600 !important; }
.nav-logout:hover { background:var(--accent) !important; }

/* MAIN GRID */
.page-wrap { display:grid; grid-template-columns:1fr 340px; gap:32px; max-width:1100px; margin:0 auto; padding:48px 48px 80px; animation:riseUp .6s cubic-bezier(.16,1,.3,1) both; }
@keyframes riseUp { from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);} }
@media(max-width:860px){.page-wrap{grid-template-columns:1fr;padding:24px 20px 60px;}.sticky-card{position:static;}header{padding:0 20px;}}

/* BREADCRUMB */
.breadcrumb { display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--muted);margin-bottom:24px; }
.breadcrumb a { color:var(--muted);text-decoration:none;transition:color .2s; }
.breadcrumb a:hover { color:var(--ink); }
.breadcrumb span { opacity:.4; }

/* COURSE HERO */
.course-hero { background:var(--ink); color:#fff; border-radius:24px; padding:40px; position:relative; overflow:hidden; margin-bottom:28px; }
.course-hero::before { content:''; position:absolute; top:-60px; right:-60px; width:220px; height:220px; border-radius:50%; border:40px solid rgba(255,77,46,.15); }
.course-hero::after { content:''; position:absolute; bottom:-40px; left:120px; width:160px;height:160px;border-radius:50%; border:28px solid rgba(255,184,0,.1); }
.course-hero-inner { position:relative;z-index:1; }
.hero-top { display:flex;gap:16px;align-items:flex-start;margin-bottom:12px; }
.course-emoji-lg { width:64px;height:64px;background:rgba(255,255,255,.08);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0; }
.hero-meta { display:flex;flex-direction:column;gap:8px; }
.hero-badge { background:rgba(255,184,0,.15);color:var(--accent2);padding:4px 12px;border-radius:100px;font-size:.68rem;font-weight:600;width:fit-content; }
.course-hero h2 { font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-.03em;line-height:1.2; }

/* TABS */
.tabs { display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:28px; }
.tab-btn { padding:12px 20px;background:none;border:none;font-size:.85rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:0.2s;font-family:'DM Sans',sans-serif; }
.tab-btn:hover { color:var(--ink); }
.tab-btn.active { color:var(--ink);border-bottom-color:var(--ink); }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

.section-label { font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:16px; }
#course-description { font-size:.92rem;line-height:1.75;color:var(--ink); }

/* SYLLABUS */
.syllabus-list { display:flex;flex-direction:column;gap:10px; }
.syllabus-item { display:flex;align-items:flex-start;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px; }
.syllabus-num { font-family:'Syne',sans-serif;font-weight:700;font-size:.75rem;color:var(--accent);min-width:24px;margin-top:2px; }
.syllabus-text { font-size:.88rem;color:var(--ink);line-height:1.5; }

/* STICKY CARD */
.sticky-card { position:sticky;top:84px;background:var(--card);border:1px solid var(--border);border-radius:24px;box-shadow:0 4px 24px rgba(0,0,0,.07);overflow:hidden; }
.card-header { background:var(--paper);padding:24px 28px;border-bottom:1px solid var(--border); }
.price-label { font-size:.7rem;font-weight:500;text-transform:uppercase;color:var(--muted);margin-bottom:6px; }
.price { font-family:'Syne',sans-serif;font-weight:800;font-size:2.2rem;color:var(--ink); }
.price-free { font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;color:var(--green); }
.card-body { padding:24px 28px; }
.feature-list { list-style:none;display:flex;flex-direction:column;gap:12px;margin-bottom:24px; }
.feature-list li { display:flex;align-items:center;gap:10px;font-size:.83rem;color:var(--muted); }
.feature-list li .icon { width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:.9rem;background:var(--paper); }

.btn-enroll { width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;margin-bottom:12px;transition:background .2s,transform .15s; }
.btn-enroll:hover { background:#e03d20;transform:translateY(-1px); }
.btn-enroll:disabled { background:var(--muted);cursor:not-allowed;transform:none; }

.btn-wishlist { width:100%;padding:13px;background:transparent;color:var(--ink);border:1.5px solid var(--border);border-radius:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.88rem;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px; }
.btn-wishlist:hover { border-color:var(--accent);color:var(--accent);background:rgba(255,77,46,.04); }
.btn-wishlist.saved { background:rgba(255,77,46,.07);border-color:var(--accent);color:var(--accent); }

#course-msg { margin-top:14px;font-size:.8rem;font-weight:500;text-align:center;min-height:20px; }
#course-msg.success { color:var(--green); }
#course-msg.error { color:var(--accent); }
#course-msg.info { color:var(--muted); }
</style>
</head>
<body>

<header>
    <a href="home.html" class="logo"><span class="logo-dot"></span>Skill Academy</a>
    <nav>
        <a href="courses.html" class="nav-back">← Courses</a>
        <a href="enrolled.html">My Courses</a>
        <a href="login.html" class="nav-logout" onclick="logout()">Logout</a>
    </nav>
</header>

<main>
<div class="page-wrap">

    <!-- LEFT -->
    <div class="course-main">
        <div class="breadcrumb">
            <a href="home.html">Home</a>
            <span>›</span>
            <a href="courses.html">Courses</a>
            <span>›</span>
            <span id="breadcrumb-title">Loading…</span>
        </div>

        <div class="course-hero">
            <div class="course-hero-inner">
                <div class="hero-top">
                    <div class="course-emoji-lg" id="course-emoji">📚</div>
                    <div class="hero-meta">
                        <span class="hero-badge">✦ Featured Course</span>
                        <h2 id="course-title">Loading course…</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('description', this)">Overview</button>
            <button class="tab-btn" onclick="switchTab('syllabus', this)">Syllabus</button>
        </div>

        <div id="tab-description" class="tab-panel active">
            <p class="section-label">About this course</p>
            <p id="course-description">Loading description…</p>
        </div>

        <div id="tab-syllabus" class="tab-panel">
            <p class="section-label">What you'll learn</p>
            <div class="syllabus-list" id="syllabus-list"></div>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="sticky-card">
        <div class="card-header">
            <p class="price-label">Course fee</p>
            <div id="price-display"></div>
        </div>
        <div class="card-body">
            <ul class="feature-list">
                <li><span class="icon">🎓</span> Certificate on completion</li>
                <li><span class="icon">♾️</span> Lifetime access</li>
                <li><span class="icon">📱</span> Mobile & desktop access</li>
                <li><span class="icon">🌐</span> Learn at your own pace</li>
            </ul>
            <button class="btn-enroll" id="enroll-btn" onclick="handleEnroll()">Enroll Now →</button>
            <button class="btn-wishlist" id="wishlist-btn" onclick="toggleWishlist()">
                <span id="wishlist-icon">♡</span>
                <span id="wishlist-text">Save for Later</span>
            </button>
            <p id="course-msg"></p>
        </div>
    </div>

</div>
</main>

<script src="script.js"></script>
<script>
// ---- stored course data ----
let currentCourse = null;

// ---- Tab switching ----
function switchTab(tabId, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tabId).classList.add('active');
    btn.classList.add('active');
}

// ---- Load course details ----
async function loadCourseDetailsPage() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) return;

    try {
        const res = await fetch(`http://localhost:3000/courses/${id}`);
        const course = await res.json();
        currentCourse = course;

        document.getElementById('course-title').innerText = course.title;
        document.getElementById('breadcrumb-title').innerText =
            course.title.length > 25 ? course.title.slice(0,25) + '…' : course.title;
        document.getElementById('course-description').innerText = course.description;

        // Price display
        const priceEl = document.getElementById('price-display');
        const fees = Number(course.fees);
        if (fees === 0) {
            priceEl.className = 'price-free';
            priceEl.innerText = 'FREE';
        } else {
            priceEl.className = 'price';
            priceEl.innerText = '₹' + fees;
        }

        // Syllabus
        if (course.syllabus) {
            const list = document.getElementById('syllabus-list');
            list.innerHTML = '';
            const items = course.syllabus.split('\n').filter(s => s.trim());
            items.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'syllabus-item';
                div.innerHTML = `<span class="syllabus-num">0${i+1}</span><span class="syllabus-text">${item.trim()}</span>`;
                list.appendChild(div);
            });
        }

        // Set emoji based on course title keywords
        const emojis = { python:'🐍', web:'🌐', design:'🎨', data:'📊', ai:'🤖', react:'⚛️', java:'☕', sql:'🗄️', default:'📚' };
        const titleLower = course.title.toLowerCase();
        let emoji = emojis.default;
        for (const [key, val] of Object.entries(emojis)) {
            if (titleLower.includes(key)) { emoji = val; break; }
        }
        document.getElementById('course-emoji').innerText = emoji;

        // Wishlist state
        updateWishlistButton();

    } catch (err) {
        console.error(err);
        document.getElementById('course-title').innerText = 'Failed to load course';
    }
}

// ---- Enroll ----
async function handleEnroll() {
    const user_id = localStorage.getItem('user_id');
    if (!user_id) {
        alert('Please login first');
        window.location.href = 'login.html';
        return;
    }

    const params = new URLSearchParams(window.location.search);
    const course_id = params.get('id');
    const msgEl = document.getElementById('course-msg');
    const btn = document.getElementById('enroll-btn');

    if (!currentCourse) return;

    const fees = Number(currentCourse.fees);
    const isFree = fees === 0;

    if (!isFree) {
        // Redirect to payment page for paid courses
        window.location.href = `payment.html?course_id=${course_id}`;
        return;
    }

    // FREE course — enroll directly via JSON
    btn.disabled = true;
    btn.innerText = 'Enrolling…';
    msgEl.className = 'info';
    msgEl.innerText = 'Processing…';

    try {
        const res = await fetch('http://localhost:3000/register-course', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id, course_id, isFree: true })
        });

        const data = await res.json();

        if (res.ok) {
            msgEl.className = 'success';
            msgEl.innerText = '🎉 ' + data.message;
            btn.innerText = '✓ Enrolled';
            setTimeout(() => { window.location.href = 'enrolled.html'; }, 1200);
        } else {
            msgEl.className = 'error';
            msgEl.innerText = '⚠️ ' + data.error;
            btn.disabled = false;
            btn.innerText = 'Enroll Now →';
        }
    } catch (err) {
        console.error(err);
        msgEl.className = 'error';
        msgEl.innerText = 'Server error — try again';
        btn.disabled = false;
        btn.innerText = 'Enroll Now →';
    }
}

// ---- Save for Later (Wishlist) ----
function getWishlist() {
    return JSON.parse(localStorage.getItem('wishlist') || '[]');
}

function saveWishlist(list) {
    localStorage.setItem('wishlist', JSON.stringify(list));
}

function isInWishlist(course_id) {
    return getWishlist().some(item => String(item.id) === String(course_id));
}

function toggleWishlist() {
    const params = new URLSearchParams(window.location.search);
    const course_id = params.get('id');
    const msgEl = document.getElementById('course-msg');

    if (!currentCourse) return;

    let wishlist = getWishlist();

    if (isInWishlist(course_id)) {
        wishlist = wishlist.filter(item => String(item.id) !== String(course_id));
        saveWishlist(wishlist);
        msgEl.className = 'info';
        msgEl.innerText = 'Removed from saved list.';
    } else {
        wishlist.push({ id: course_id, title: currentCourse.title, fees: currentCourse.fees });
        saveWishlist(wishlist);
        msgEl.className = 'success';
        msgEl.innerText = '♡ Saved to your list!';
    }
    updateWishlistButton();
    setTimeout(() => { msgEl.innerText = ''; }, 2500);
}

function updateWishlistButton() {
    const params = new URLSearchParams(window.location.search);
    const course_id = params.get('id');
    const btn = document.getElementById('wishlist-btn');
    const icon = document.getElementById('wishlist-icon');
    const text = document.getElementById('wishlist-text');

    if (isInWishlist(course_id)) {
        btn.classList.add('saved');
        icon.innerText = '♥';
        text.innerText = 'Saved';
    } else {
        btn.classList.remove('saved');
        icon.innerText = '♡';
        text.innerText = 'Save for Later';
    }
}

loadCourseDetailsPage();
</script>

</body>
</html>
