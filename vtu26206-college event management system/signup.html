<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Event Management</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(to right, #4f6d7a, #81d4e6);
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background-color: white;
            width: 350px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-box h1 {
            margin-bottom: 20px;
            color: #3a5f7d;
        }

        .login-box input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .login-box button {
            width: 95%;
            padding: 10px;
            background-color: #3a5f7d;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }

        .login-box button:hover {
            background-color: #2c4b63;
        }

        .login-box p {
            margin-top: 15px;
            font-size: 14px;
        }

        .login-box a {
            text-decoration: none;
            color: #3a5f7d;
            font-weight: bold;
        }

        .login-box a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h1>Sign Up</h1>
        <input type="text" placeholder="Name">
        <input type="password" placeholder="Department">
        <input type="password" placeholder="Year">
        <input type="password" placeholder="Set Password">
        <input type="password" placeholder="Confirm Password">
        <button>register</button>
        <p>If You have an account? <a href="login.html">login</a></p>
    </div>
</body>
</html>
