<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses — Skill Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0d0d0f;
            --paper: #f5f3ee;
            --accent: #ff4d2e;
            --accent2: #ffb800;
            --muted: #8a8680;
            --card: #ffffff;
            --border: #e2dfd8;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
        }

        /* ── NAVBAR ── */
        header {
            position: sticky;
            top: 0; z-index: 100;
            background: rgba(245,243,238,0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            padding: 0 48px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: -.02em;
            color: var(--ink);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-dot {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { transform:scale(1); opacity:1; }
            50%      { transform:scale(1.4); opacity:.7; }
        }
        nav { display: flex; align-items: center; gap: 8px; }
        nav a {
            font-size: .85rem;
            font-weight: 500;
            color: var(--muted);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 100px;
            transition: color .2s, background .2s;
        }
        nav a:hover { color: var(--ink); background: rgba(13,13,15,.06); }
        .nav-logout {
            background: var(--ink) !important;
            color: #fff !important;
            font-family: 'Syne', sans-serif;
            font-weight: 600 !important;
        }
        .nav-logout:hover { background: var(--accent) !important; color: #fff !important; }

        /* ── PAGE HEADER ── */
        .page-hero {
            background: var(--ink);
            padding: 56px 48px 52px;
            position: relative;
            overflow: hidden;
            animation: riseUp .6s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes riseUp {
            from { opacity:0; transform:translateY(20px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .page-hero::before {
            content: '';
            position: absolute;
            top: -80px; right: -80px;
            width: 320px; height: 320px;
            border-radius: 50%;
            border: 50px solid rgba(255,77,46,.12);
        }
        .page-hero::after {
            content: '';
            position: absolute;
            bottom: -60px; left: 200px;
            width: 220px; height: 220px;
            border-radius: 50%;
            border: 35px solid rgba(255,184,0,.1);
        }
        .page-hero-inner {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .page-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: .7rem;
            font-weight: 500;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--accent2);
            background: rgba(255,184,0,.12);
            padding: 6px 14px;
            border-radius: 100px;
            margin-bottom: 20px;
        }
        .page-hero h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            letter-spacing: -.04em;
            color: #fff;
            margin-bottom: 12px;
        }
        .page-hero h1 span { color: var(--accent); }
        .page-hero p {
            font-size: .95rem;
            color: rgba(255,255,255,.45);
            font-weight: 300;
            max-width: 480px;
            line-height: 1.65;
        }

        /* ── TOOLBAR ── */
        .toolbar {
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px 48px 0;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            animation: riseUp .7s .1s cubic-bezier(.16,1,.3,1) both;
        }

        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 220px;
        }
        .search-wrap svg {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }
        .search-wrap input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            background: var(--card);
            font-family: 'DM Sans', sans-serif;
            font-size: .88rem;
            color: var(--ink);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .search-wrap input:focus {
            border-color: var(--ink);
            box-shadow: 0 0 0 3px rgba(13,13,15,.06);
        }
        .search-wrap input::placeholder { color: #bbb9b3; }

        .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-btn {
            padding: 10px 18px;
            border: 1.5px solid var(--border);
            border-radius: 100px;
            background: var(--card);
            font-family: 'DM Sans', sans-serif;
            font-size: .8rem;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            transition: all .2s;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--ink);
            background: var(--ink);
            color: #fff;
        }

        .results-count {
            font-size: .8rem;
            color: var(--muted);
            margin-left: auto;
            white-space: nowrap;
        }
        .results-count strong { color: var(--ink); font-weight: 600; }

        /* ── COURSES GRID ── */
        .courses-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px 48px 80px;
            animation: riseUp .7s .15s cubic-bezier(.16,1,.3,1) both;
        }

        .courses-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(272px, 1fr));
            gap: 20px;
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #ece9e2 25%, #f5f3ee 50%, #ece9e2 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 20px;
            height: 260px;
        }
        @keyframes shimmer {
            from { background-position: 200% 0; }
            to   { background-position: -200% 0; }
        }

        /* Course card */
        .course-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,.04);
            transition: transform .25s, box-shadow .25s, border-color .25s;
            animation: fadeCard .45s ease both;
        }
        @keyframes fadeCard {
            from { opacity:0; transform:translateY(14px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 36px rgba(0,0,0,.1);
            border-color: transparent;
        }

        .course-emoji {
            font-size: 1.7rem;
            width: 48px; height: 48px;
            background: var(--paper);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2px;
        }

        .course-badge {
            display: inline-block;
            font-size: .65rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 100px;
            width: fit-content;
        }
        .badge-new   { background: rgba(255,184,0,.15); color: #b37d00; }
        .badge-pop   { background: rgba(255,77,46,.1);  color: var(--accent); }
        .badge-free  { background: rgba(34,197,94,.12); color: #15803d; }

        .course-card h4 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: -.02em;
            line-height: 1.3;
        }
        .course-card .desc {
            font-size: .82rem;
            color: var(--muted);
            font-weight: 300;
            line-height: 1.55;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: .75rem;
            color: var(--muted);
            padding-top: 4px;
            border-top: 1px solid var(--border);
        }
        .course-meta span { display: flex; align-items: center; gap: 4px; }

        .course-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 2px;
        }
        .course-price {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--ink);
        }
        .btn-view {
            padding: 9px 20px;
            background: var(--ink);
            color: #fff;
            border: none;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: .78rem;
            cursor: pointer;
            text-decoration: none;
            transition: background .2s, transform .15s;
            display: inline-block;
        }
        .btn-view:hover { background: var(--accent); transform: scale(1.04); }

        /* Empty / error */
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 72px 20px;
            color: var(--muted);
        }
        .empty-state .icon { font-size: 3rem; display: block; margin-bottom: 16px; }
        .empty-state p { font-size: .9rem; line-height: 1.6; }
        .empty-state strong { color: var(--ink); }

        /* ── FOOTER ── */
        footer {
            border-top: 1px solid var(--border);
            padding: 24px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        footer p { font-size: .75rem; color: var(--muted); }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            header, .page-hero { padding-left: 20px; padding-right: 20px; }
            .toolbar, .courses-section { padding-left: 20px; padding-right: 20px; }
            .results-count { display: none; }
            footer { padding: 20px; flex-direction: column; gap: 8px; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <a href="home.html" class="logo">
            <span class="logo-dot"></span>
            Skill Academy
        </a>
        <nav>
            <a href="home.html">Home</a>
            <a href="login.html" class="nav-logout" onclick="logout()">Logout</a>
        </nav>
    </header>

    <main>
        <!-- Page Hero -->
        <div class="page-hero">
            <div class="page-hero-inner">
                <div class="page-tag">✦ Explore</div>
                <h1>All <span>Available</span> Courses</h1>
                <p>Browse our full catalogue of expert-led courses and find your next skill to master.</p>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-wrap">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search courses…" oninput="filterCourses()">
            </div>
            <div class="filter-group">
                <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
                <button class="filter-btn" onclick="setFilter('free', this)">Free</button>
                <button class="filter-btn" onclick="setFilter('paid', this)">Paid</button>
            </div>
            <span class="results-count" id="results-count"></span>
        </div>

        <!-- Courses Grid -->
        <section class="courses-section">
            <div id="courses-list" class="courses-container">
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="logo">
            <span class="logo-dot"></span>
            Skill Academy
        </div>
        <p>© 2025 Skill Academy. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        const emojis = ['💻','🎨','📊','🔬','📱','🧠','🎯','⚡','🌐','🛠️','📈','🎬','🖥️','🔐','📐','🤖'];
        const badges = [
            { label: 'New',     cls: 'badge-new' },
            { label: 'Popular', cls: 'badge-pop' },
            { label: 'Free',    cls: 'badge-free' },
            null, null, null   // some cards have no badge
        ];

        let allCourses = [];
        let activeFilter = 'all';

        window.onload = () => {
            console.log('User:', localStorage.getItem('user_name'));
            loadCoursesPage();
        };

        async function loadCoursesPage() {
            const container = document.getElementById('courses-list');
            try {
                const res = await fetch('http://localhost:3000/courses');
                allCourses = await res.json();
                renderCourses(allCourses);
            } catch (err) {
                console.error(err);
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">📡</span>
                        <p>Couldn't connect to the server.<br>
                        Make sure <strong>localhost:3000</strong> is running.</p>
                    </div>`;
            }
        }

        function renderCourses(courses) {
            const container = document.getElementById('courses-list');
            const count = document.getElementById('results-count');

            if (!courses.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">🔍</span>
                        <p>No courses match your search.<br>Try a different keyword or filter.</p>
                    </div>`;
                count.innerHTML = '';
                return;
            }

            count.innerHTML = `Showing <strong>${courses.length}</strong> course${courses.length !== 1 ? 's' : ''}`;
            container.innerHTML = '';

            courses.forEach((course, i) => {
                const badge = badges[i % badges.length];
                const badgeHTML = badge
                    ? `<span class="course-badge ${badge.cls}">${badge.label}</span>`
                    : '';

                const div = document.createElement('div');
                div.className = 'course-card';
                div.style.animationDelay = `${i * 0.06}s`;
                div.innerHTML = `
                    <div class="course-emoji">${emojis[i % emojis.length]}</div>
                    ${badgeHTML}
                    <h4>${course.title}</h4>
                    <p class="desc">${course.description}</p>
                    <div class="course-meta">
                        <span>📁 Course #${course.id}</span>
                    </div>
                    <div class="course-footer">
                        <span class="course-price">${course.fees == 0 ? 'Free' : '₹' + course.fees}</span>
                        <a href="course-details.html?id=${course.id}" class="btn-view">View Details</a>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function filterCourses() {
            applyFilters();
        }

        function setFilter(type, btn) {
            activeFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById('search-input').value.toLowerCase();
            let filtered = allCourses.filter(c => {
                const matchText = c.title.toLowerCase().includes(query) ||
                                  c.description.toLowerCase().includes(query);
                const matchFilter = activeFilter === 'all' ||
                                    (activeFilter === 'free' && c.fees == 0) ||
                                    (activeFilter === 'paid' && c.fees > 0);
                return matchText && matchFilter;
            });
            renderCourses(filtered);
        }
    </script>
</body>
</html>
